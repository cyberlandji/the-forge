# PA-01 -- "You Dirty Rat!" (STRRAT)
#
# This manifest is the DECLARATIVE spec: you say what should happen,
# the harness figures out how to check it. Fill in your real SIDs and
# the real PCAP filenames once you drop them in.
#
# Start with ONE rule + ONE known-bad PCAP to get the pipeline green,
# then add the other two rules and a known-good fixture.

operation: pa-01
rules: rules/pa-02.rules

fixtures:
  # A capture that SHOULD trigger your rule(s):
  - pcap: fixtures/known-bad/lummah-1.pcap
    must_fire: [100001, 100002, 100003, 100008]

  - pcap: fixtures/known-bad/lummah-2.pcap
    must_fire: [100004, 100005, 100007, 100009, 100010, 100011, 100011, 100012, 100013]

  # A benign capture that must NOT trigger them (false-positive guard).
  - pcap: fixtures/known-good/lummah-kg.pcap
    must_not_fire: [100001, 100002, 100003, 100004, 100005, 100007, 100008, 100009, 100010, 100011, 100012, 100013]

